<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Générateur de CV dynamique</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

.container {
    display: flex;
    flex-wrap: wrap;
}

.formulaire, .cv {
    width: 50%;
    padding: 20px;
    box-sizing: border-box;
}

.formulaire {
    background: #ffffff;
}

.cv {
    background: #eaeaea;
}

input, textarea {
    width: 100%;
    margin: 5px 0;
    padding: 8px;
}

button {
    margin-top: 10px;
    padding: 10px;
    cursor: pointer;
}

h1 {
    margin-bottom: 5px;
}

.section {
    margin-top: 15px;
}

@media(max-width: 768px) {
    .formulaire, .cv {
        width: 100%;
    }
}
</style>

</head>

<body>

<div class="container">

<!-- FORMULAIRE -->
<div class="formulaire">
    <h2>Créer votre CV</h2>

    <input type="text" id="nom" placeholder="Nom">
    <input type="text" id="prenom" placeholder="Prénom">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="tel" placeholder="Téléphone">

    <textarea id="profil" placeholder="Profil"></textarea>

    <h3>Expériences</h3>
    <button onclick="addExp()">Ajouter expérience</button>
    <div id="expContainer"></div>

    <h3>Compétences</h3>
    <button onclick="addSkill()">Ajouter compétence</button>
    <div id="skillContainer"></div>

    <button onclick="printCV()">🖨️ Imprimer / Télécharger</button>
</div>

<!-- CV -->
<div class="cv" id="cv">
    <h1 id="cvNom">Nom Prénom</h1>
    <p id="cvEmail"></p>
    <p id="cvTel"></p>

    <div class="section">
        <h3>Profil</h3>
        <p id="cvProfil"></p>
    </div>

    <div class="section">
        <h3>Expériences</h3>
        <div id="cvExp"></div>
    </div>

    <div class="section">
        <h3>Compétences</h3>
        <ul id="cvSkills"></ul>
    </div>
</div>

</div>

<script>
// Mise à jour en temps réel
document.getElementById("nom").addEventListener("input", updateNom);
document.getElementById("prenom").addEventListener("input", updateNom);

function updateNom() {
    let nom = document.getElementById("nom").value;
    let prenom = document.getElementById("prenom").value;
    document.getElementById("cvNom").textContent = nom + " " + prenom;
}

document.getElementById("email").addEventListener("input", function() {
    document.getElementById("cvEmail").textContent = this.value;
});

document.getElementById("tel").addEventListener("input", function() {
    document.getElementById("cvTel").textContent = this.value;
});

document.getElementById("profil").addEventListener("input", function() {
    document.getElementById("cvProfil").textContent = this.value;
});

// Ajouter expérience
function addExp() {
    let input = document.createElement("input");
    input.placeholder = "Nouvelle expérience";

    input.addEventListener("input", function() {
        updateExp();
    });

    document.getElementById("expContainer").appendChild(input);
}

function updateExp() {
    let container = document.getElementById("cvExp");
    container.innerHTML = "";

    let inputs = document.querySelectorAll("#expContainer input");

    inputs.forEach(input => {
        let p = document.createElement("p");
        p.textContent = input.value;
        container.appendChild(p);
    });
}

// Ajouter compétence
function addSkill() {
    let input = document.createElement("input");
    input.placeholder = "Nouvelle compétence";

    input.addEventListener("input", function() {
        updateSkills();
    });

    document.getElementById("skillContainer").appendChild(input);
}

function updateSkills() {
    let list = document.getElementById("cvSkills");
    list.innerHTML = "";

    let inputs = document.querySelectorAll("#skillContainer input");

    inputs.forEach(input => {
        let li = document.createElement("li");
        li.textContent = input.value;
        list.appendChild(li);
    });
}

// Impression
function printCV() {
    window.print();
}
</script>

</body>
</html>
